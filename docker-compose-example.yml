services:
  database:
    image: postgres:18-alpine
    container_name: <CONTAINER-NAME>
    restart: always
    environment:
      - POSTGRES_USER=<USER>
      - POSTGRES_PASSWORD=<PASSWORD>
      - POSTGRES_DB=<DATABASE-NAME>
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
      - ./migrations/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  pgdata:
